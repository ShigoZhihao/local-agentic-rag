ollama:
  base_url: "http://127.0.0.1:11434/v1"
  planner_model: "qwen2.5:9b"   # Facilitator / Validator
  executor_model: "qwen2.5:2b"  # Synthesizer
  temperature: 0.2
  max_tokens: 2048

vision:
  base_url: "http://127.0.0.1:11434/v1"
  model_name: "qwen3-vl:8b"  # (used for ingestion only)
  max_tokens: 1024
  dpi: 200  # PDF/PPTX rendering resolution

embeddings:
  model_name: "BAAI/bge-m3"
  device: "cuda"  # RTX A4000 GPU acceleration
  batch_size: 32
  dimension: 1024

weaviate:
  host: "localhost"
  port: 8080
  grpc_port: 50051
  collection_name: "Documents"

chunking:
  # Default strategy per file type:
  # txt/md -> recursive, html -> html, py -> python,
  # semantic -> semantic, example collections -> example,
  # pdf/pptx -> visual
  default_strategy: "recursive"
  recursive:
    chunk_size: 512
    overlap_percent: 0  # Start at 0%. Increase as needed.
    separators: ["\n\n", "\n", ". ", " "]
  html:
    tags_to_split: ["p", "h1", "h2", "h3", "h4", "li"]
  python:
    split_on: ["def ", "class "]
    include_decorator: true
  semantic:
    cosine_threshold: 0.75
    min_chunk_size: 100
    max_chunk_size: 1000
  example:
    delimiter: "---"  # Delimiter for example collections
  visual:
    one_chunk_per_page: true  # PDF/PPTX: 1 page = 1 chunk

retrieval:
  bm25:
    k1: 1.2   # Term frequency saturation (typical: 1.2-2.0)
    b: 0.75   # Document length normalization (0=none, 1=full)
    top_k: 20
  semantic:
    top_k: 20
    distance_metric: "cosine"
  hybrid:
    alpha: 0.5  # 0=BM25 only, 1=Semantic only
    top_k: 20
  colbert:
    enabled: false  # Enable on-demand
    model_name: "colbert-ir/colbertv2.0"
    top_k: 10

reranking:
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5   # Number of results to return after re-ranking
  batch_size: 16

agents:
  max_loop_count: 3  # Max Validator→Facilitator feedback loops
  validation_threshold: 80  # Validator pass threshold (average score)
  facilitator:
    model: "planner"  # qwen2.5:9b
  synthesizer:
    model: "executor"  # qwen2.5:2b
  validator:
    model: "planner"  # qwen2.5:9b
    scoring_criteria:
      - "completeness"   # All requirements of enriched prompt are covered
      - "accuracy"       # Consistency with cited source text
      - "relevance"      # Alignment with the user's original intent
      - "faithfulness"   # No information generated beyond cited sources

evaluation:
  metrics: ["precision@5", "recall@10", "map@10", "mrr@10"]
  bm25_tuning:
    k1_range: [0.5, 0.75, 1.0, 1.2, 1.5, 2.0]
    b_range: [0.0, 0.25, 0.5, 0.75, 1.0]
    optimize_metric: "map@10"
