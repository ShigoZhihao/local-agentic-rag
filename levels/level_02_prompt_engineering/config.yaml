ollama:
  base_url: "http://127.0.0.1:11434/v1"
  model: "gemma4:e2b"
  temperature: 0.7
  max_tokens: 1024

agent:
  system_prompt: "You are a helpful assistant. Answer clearly and concisely."
  prompt_mode: "basic"        # basic | cot | few_shot | structured
  max_history_turns: 20       # max conversation turns kept in context
