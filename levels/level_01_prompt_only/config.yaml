ollama:
  # Ollama provides two types of APIs: its native API (e.g., /api/generate) and an OpenAI-compatible API (e.g., /v1/chat/completions). Adding /v1 signals that you want to communicate using the OpenAI standard
  model: "gemma4:e4b"
  base_url: "http://localhost:11434/v1" 
  temperature: 0.1
  max_tokens: 4096  # 512 caused empty responses on reasoning models (thinking consumed all tokens before the answer)